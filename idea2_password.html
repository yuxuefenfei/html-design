<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解锁密码 - 孟颖</title>
    <style>
        body { 
            margin: 0; background: #111; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif; color: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;
            transition: background 1.5s ease;
        }
        
        .container { text-align: center; z-index: 10; }

        .heart {
            position: relative; width: 100px; height: 100px; background: #444;
            transform: rotate(-45deg); margin: 0 auto 50px;
            transition: all 1.5s ease;
            box-shadow: 0 0 10px #222;
        }
        .heart::before, .heart::after {
            content: ''; position: absolute; width: 100px; height: 100px;
            background: inherit; border-radius: 50%;
        }
        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: 50px; }

        /* Actived Heart */
        body.unlocked {
            background: radial-gradient(circle at center, #2e0000 0%, #000000 100%);
        }
        body.unlocked .heart {
            background: #ff1e3c;
            animation: heartbeat 1s infinite;
            box-shadow: 0 0 50px #ff1e3c, 0 0 100px #ea0022;
        }

        @keyframes heartbeat {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.2); }
        }

        .input-group {
            background: rgba(255,255,255,0.05);
            padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); transition: opacity 1s;
        }

        input {
            background: transparent; border: none; border-bottom: 2px solid #555;
            color: white; font-size: 1.5rem; text-align: center; padding: 10px; width: 250px;
            outline: none; transition: border-color 0.3s;
        }
        input:focus { border-bottom-color: #ff1e3c; }
        
        .msg { margin-top: 15px; font-size: 0.9rem; color: #888; height: 20px; }

        .welcome-msg {
            display: none; font-size: 2rem; color: #ff4d63; font-weight: 300;
            letter-spacing: 5px; margin-top: -50px; opacity: 0; animation: fadeIn 2s forwards 1s;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Modal */
        .info-btn { position: absolute; top: 30px; right: 30px; z-index: 20; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,20,0.9); border: 1px solid #ff1e3c; padding: 30px; border-radius: 15px; z-index: 30; text-align: center; max-width: 300px;}
        .close-btn { margin-top: 20px; padding: 8px 24px; background: #ff1e3c; border: none; color: white; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="info-btn" id="openModal">📖 寓意</div>
    <div class="modal" id="modal">
        <h2 style="color:#ff4d63; margin-top:0;" id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <button class="close-btn" id="closeModal">关闭</button>
    </div>

    <div class="container">
        <div class="heart" id="heart"></div>
        
        <div class="input-group" id="inputGroup">
            <p id="passHint"></p>
            <input type="text" id="pwd" placeholder="输入密码后回车自动解锁" autocomplete="off">
            <div class="msg" id="msg">等待输入...</div>
        </div>
        
        <div class="welcome-msg" id="welcomeMsg"></div>
    </div>

    <script>
        const CONFIG = {
            passwords: ['孟颖', '2000', 'mengying', '颖'],
            passHint: '通关密码是：属于我的小龙女',
            welcomeMessage: '欢迎来到我的世界，孟颖',
            modalTitle: '解锁你的心',
            modalDesc: '曾经我的世界是一片寂静的灰白。直到带着千禧龙年专属密码的你突然降临，才彻底解锁并点亮了我全部的心跳。'
        };

        const pwdInput = document.getElementById('pwd');
        const msg = document.getElementById('msg');
        
        document.getElementById('modalTitle').innerText = CONFIG.modalTitle;
        document.getElementById('modalDesc').innerText = CONFIG.modalDesc;
        document.getElementById('passHint').innerText = CONFIG.passHint;
        document.getElementById('welcomeMsg').innerText = CONFIG.welcomeMessage;

        document.getElementById('openModal').addEventListener('click', () => document.getElementById('modal').style.display = 'block');
        document.getElementById('closeModal').addEventListener('click', () => document.getElementById('modal').style.display = 'none');
        
        pwdInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if(CONFIG.passwords.includes(val)) {
                unlock();
            } else if(val.length > 0) {
                msg.textContent = '密码不对哦...';
                msg.style.color = '#ff6b6b';
            } else {
                msg.textContent = '等待输入...';
                msg.style.color = '#888';
            }
        });

        function unlock() {
            document.body.classList.add('unlocked');
            document.getElementById('inputGroup').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('inputGroup').style.display = 'none';
                const wMsg = document.getElementById('welcomeMsg');
                wMsg.style.display = 'block';
                createSparks();
            }, 1000);
        }

        // Optimized sparks effect using documentFragment and will-change
        function createSparks() {
            const fragment = document.createDocumentFragment();
            for(let i=0; i<30; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'absolute';
                spark.style.width = '4px'; spark.style.height = '4px';
                spark.style.background = '#ff4d63'; spark.style.borderRadius = '50%';
                spark.style.top = '50%'; spark.style.left = '50%';
                spark.style.boxShadow = '0 0 10px #ff1e3c';
                spark.style.willChange = 'transform, opacity';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 300 + 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                spark.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], { duration: 1500 + Math.random()*1000, easing: 'cubic-bezier(0, .9, .57, 1)' });
                
                fragment.appendChild(spark);
            }
            document.body.appendChild(fragment);
        }
    </script>
</body>
</html>
